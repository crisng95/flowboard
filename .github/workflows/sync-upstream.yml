name: Sync fork main with upstream

on:
  schedule:
    # Every day at 02:00 UTC (09:00 Asia/Saigon)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Upstream branch to sync from"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  sync:
    name: Rebase main onto upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/crisng95/flowboard.git
          git remote -v

      - name: Fetch upstream
        run: git fetch upstream --prune

      - name: Determine upstream branch
        id: upstream
        run: |
          BRANCH="${{ github.event.inputs.upstream_branch }}"
          if [ -z "$BRANCH" ]; then BRANCH="main"; fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Check divergence
        id: check
        run: |
          set -e
          BRANCH="${{ steps.upstream.outputs.branch }}"
          AHEAD=$(git rev-list --count upstream/$BRANCH..HEAD)
          BEHIND=$(git rev-list --count HEAD..upstream/$BRANCH)
          echo "ahead=$AHEAD"  >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork main is $AHEAD commit(s) ahead and $BEHIND commit(s) behind upstream/$BRANCH."

      - name: Skip if already up to date
        if: steps.check.outputs.behind == '0'
        run: echo "Already up to date with upstream/${{ steps.upstream.outputs.branch }}."

      - name: Guard against unexpected drift on main
        if: steps.check.outputs.behind != '0'
        run: |
          set -e
          # Inspect commits on fork main that are not on upstream.
          # Allow only fork-owned CI commits (paths under .github/) to live on main.
          FORK_COMMITS=$(git rev-list upstream/${{ steps.upstream.outputs.branch }}..HEAD)
          if [ -z "$FORK_COMMITS" ]; then
            echo "No fork-only commits on main. Will fast-forward."
            exit 0
          fi
          echo "Fork-only commits on main:"
          echo "$FORK_COMMITS"
          for sha in $FORK_COMMITS; do
            FILES=$(git diff-tree --no-commit-id --name-only -r "$sha")
            BAD=$(echo "$FILES" | grep -v '^.github/' || true)
            if [ -n "$BAD" ]; then
              echo "::error::Commit $sha touches non-CI files. Refusing automatic rebase."
              echo "Files outside .github/:"
              echo "$BAD"
              echo "Move these commits to a feature branch, then re-run sync."
              exit 1
            fi
          done
          echo "All fork-only commits are CI-only. Safe to rebase."

      - name: Rebase main onto upstream
        if: steps.check.outputs.behind != '0'
        run: git rebase upstream/${{ steps.upstream.outputs.branch }}

      - name: Push to fork
        if: steps.check.outputs.behind != '0'
        run: git push origin main --force-with-lease

      - name: Summary
        if: always()
        run: |
          {
            echo "### Sync result";
            echo "";
            echo "- Upstream: \`crisng95/flowboard@${{ steps.upstream.outputs.branch }}\`";
            echo "- Ahead before sync:  ${{ steps.check.outputs.ahead }}";
            echo "- Behind before sync: ${{ steps.check.outputs.behind }}";
          } >> "$GITHUB_STEP_SUMMARY"
