name: Sync fork main with upstream

on:
  schedule:
    # Every day at 02:00 UTC (09:00 Asia/Saigon)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: 'Upstream branch to sync from'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    name: Fast-forward main from upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/crisng95/flowboard.git
          git remote -v

      - name: Fetch upstream
        run: git fetch upstream --prune

      - name: Determine upstream branch
        id: upstream
        run: |
          BRANCH="${{ github.event.inputs.upstream_branch }}"
          if [ -z "$BRANCH" ]; then BRANCH="main"; fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Check divergence
        id: check
        run: |
          set -e
          BRANCH="${{ steps.upstream.outputs.branch }}"
          AHEAD=$(git rev-list --count upstream/$BRANCH..HEAD)
          BEHIND=$(git rev-list --count HEAD..upstream/$BRANCH)
          echo "ahead=$AHEAD"  >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork main is $AHEAD commit(s) ahead and $BEHIND commit(s) behind upstream/$BRANCH."

      - name: Refuse if fork main has diverged
        if: steps.check.outputs.ahead != '0'
        run: |
          echo "::error::Fork main is ${{ steps.check.outputs.ahead }} commit(s) ahead of upstream. Refusing fast-forward."
          echo "Resolve manually: rebase fork main onto upstream, or move custom commits to a feature branch."
          exit 1

      - name: Skip if already up to date
        if: steps.check.outputs.behind == '0'
        run: echo "Already up to date with upstream/${{ steps.upstream.outputs.branch }}."

      - name: Fast-forward main
        if: steps.check.outputs.ahead == '0' && steps.check.outputs.behind != '0'
        run: git merge --ff-only upstream/${{ steps.upstream.outputs.branch }}

      - name: Push to fork
        if: steps.check.outputs.ahead == '0' && steps.check.outputs.behind != '0'
        run: git push origin main

      - name: Summary
        if: always()
        run: |
          {
            echo "### Sync result";
            echo "";
            echo "- Upstream: \`crisng95/flowboard@${{ steps.upstream.outputs.branch }}\`";
            echo "- Ahead:  ${{ steps.check.outputs.ahead }}";
            echo "- Behind: ${{ steps.check.outputs.behind }}";
          } >> "$GITHUB_STEP_SUMMARY"

